name: Release macOS

"on":
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release-macos:
    name: Build and publish macOS app
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Package macOS app
        run: npm run pack:mac

      - name: Prepare release artifacts
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"
          APP_PATH="release/mac-arm64/BatchWM.app"
          ARCHIVE="BatchWM-${VERSION}-mac-arm64.zip"
          CHECKSUM="${ARCHIVE}.sha256"

          test -d "$APP_PATH"
          /usr/bin/ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ARCHIVE"
          shasum -a 256 "$ARCHIVE" > "$CHECKSUM"

          cat > RELEASE_NOTES.md <<EOF
          BatchWM ${VERSION}

          - macOS arm64 app bundle
          - Built from commit ${GITHUB_SHA}
          - This build is not code-signed or notarized.
          EOF

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
          echo "CHECKSUM=$CHECKSUM" >> "$GITHUB_ENV"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" "$ARCHIVE" "$CHECKSUM" \
            --title "BatchWM ${VERSION}" \
            --notes-file RELEASE_NOTES.md \
            --verify-tag
