name: Release macOS

"on":
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish, for example v0.1.3"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-macos:
    name: Build and publish macOS app
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Package macOS app
        run: npm run pack:mac

      - name: Prepare release artifacts
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          VERSION="${RELEASE_TAG#v}"
          APP_PATH="release/mac-arm64/BatchWM.app"
          ARCHIVE="BatchWM-${VERSION}-mac-arm64.zip"
          CHECKSUM="${ARCHIVE}.sha256"

          test -d "$APP_PATH"
          /usr/bin/ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ARCHIVE"
          shasum -a 256 "$ARCHIVE" > "$CHECKSUM"

          cat > RELEASE_NOTES.md <<EOF
          BatchWM ${VERSION}

          - macOS arm64 app bundle
          - Built from commit ${GITHUB_SHA}
          - This build is not code-signed or notarized.
          EOF

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
          echo "CHECKSUM=$CHECKSUM" >> "$GITHUB_ENV"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$ARCHIVE" "$CHECKSUM" --clobber
          else
            gh release create "$RELEASE_TAG" "$ARCHIVE" "$CHECKSUM" \
              --title "BatchWM ${VERSION}" \
              --notes-file RELEASE_NOTES.md \
              --verify-tag
          fi
